<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>
    A Special Surprise ❤️
  </title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Fonts -->
  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@600;700&family=Caveat:wght@500;700&display=swap"
        rel="stylesheet">

</head>

<body>

  <!-- Background Memory Slideshow -->
  <div id="backgroundSlideshow">
    <img id="bgSlide"
         src="assets/memories1.jpg"
         alt="">
  </div>

  <!-- Dark Overlay -->
  <div id="bgOverlay"></div>

  <!-- Floating Effects Containers -->
  <div id="effects"></div>

  <!-- Main App -->
  <main id="app"></main>

  <!-- Background Music -->
  <audio id="bgMusic" loop>
    <source src="assets/birthday.mp3"
            type="audio/mp3">
  </audio>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- Main Script -->
  <script src="script.js"></script>

</body>

</html>

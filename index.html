<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
  name="viewport"
  content=
  "width=device-width,
  initial-scale=1.0"/>

  <title>
  A Special Surprise ❤️
  </title>

  <!-- CSS -->
  <link
  rel="stylesheet"
  href="style.css">

  <!-- Fonts -->
  <link
  rel="preconnect"
  href=
  "https://fonts.googleapis.com">

  <link
  rel="preconnect"
  href=
  "https://fonts.gstatic.com"
  crossorigin>

  <link
  href=
  "https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@600;700&family=Caveat:wght@500;700&display=swap"
  rel="stylesheet">

</head>

<body>

  <!-- Romantic Overlay -->
  <div id="overlay"></div>

  <!-- Floating hearts -->
  <div id=
  "hearts-container">
  </div>

  <!-- Petals -->
  <div id=
  "petals-container">
  </div>

  <!-- Main App -->
  <main id="app">
  </main>

  <!-- Background Music -->
  <audio
  id="bgMusic"
  loop>

    <source
    src=
    "assets/birthday.mp3"
    type=
    "audio/mp3">

  </audio>

  <!-- Confetti -->
  <script src=
  "https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js">
  </script>

  <!-- GSAP cinematic animations -->
  <script src=
  "https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
  </script>

  <!-- Script -->
  <script
  src="script.js">
  </script>

</body>
</html>
